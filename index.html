<!doctype html><html lang="ja"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="style.css"><title>BELT Prototype 0.2A</title></head>
<body>
<div class="bg"></div>
<div class="overlay"></div>

<section class="page active" id="title">
<div class="belt"></div>
<h1>BELT</h1>
<p class="sub">継承されるのは、ベルトではない。</p>
<button onclick="show('home')">続きから</button>
<button onclick="show('home')">新しく始める</button>
</section>

<section class="page" id="home">
<h2>控室</h2>
<div class="room">
<div class="card">📰 新聞<br><small onclick="show('news')">読む</small></div>
<div class="card">🏆 ベルト</div>
<div class="card">🥊 試合</div>
<div class="card">📖 年表</div>
</div>
<button onclick="show('title')">戻る</button>
</section>

<section class="page" id="news">
<div class="paper">
<div class="head">プロレス新報</div>
<h3>US王座初防衛！</h3>
<div class="photo">PHOTO</div>
<p>王者は盤石の試合運びで初防衛に成功。</p>
<hr>
<b>Chronicle</b>
<p class="c">「あの程度のラリアットで勝てると思ったのでしょうか。」</p>
</div>
<button onclick="show('home')">戻る</button>
</section>
<script src="script.js"></script></body></html>
